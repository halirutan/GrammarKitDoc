site_name: Grammar-Kit Documentation
site_description: Comprehensive guide for creating language parsers and PSI implementations using Grammar-Kit
site_author: GrammarKit Documentation Team
site_url: https://grammarkit.github.io/documentation/

repo_name: JetBrains/Grammar-Kit
repo_url: https://github.com/JetBrains/Grammar-Kit

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - codehilite
  - pymdownx.keys
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.details
  - pymdownx.snippets
  - pymdownx.inlinehilite
  - toc:
      permalink: true

nav:
  - Getting Started:
      - What is Grammar-Kit?: index.md
      - Features: features.md
      - Installation and Setup: installation.md
      - Quick Start Tutorial: quick-start.md
  - Grammar Development:
      - BNF Grammar Syntax: grammar-development/grammar-syntax.md
      - Designing Grammar Rules: grammar-development/grammar-design.md
      - Expression Parsing: grammar-development/expression-parsing.md
      - Error Recovery: grammar-development/error-recovery.md
      - Live Preview Workflow: grammar-development/live-preview.md
      - External Rules: grammar-development/external-rules.md
      - Grammar Composition: grammar-development/grammar-composition.md
  - Code Generation & Customization:
      - Attributes System: code-generation/attributes.md
      - Parser Generation: code-generation/parser-generation.md
      - Lexer Integration: code-generation/lexer-integration.md
      - PSI Customization: code-generation/psi-customization.md
  - Integration:
      - IDE Integration:
          - Parser Definition: integration/parser-definition.md
          - Language Features: integration/language-features.md
          - Testing: integration/testing.md
      - Build Integration:
          - Gradle Plugin Setup: integration/gradle-setup.md
          - Gradle vs IDE Generation: integration/gradle-vs-ide.md
  - Advanced Topics & Troubleshooting:
      - Performance Optimization: advanced/performance.md
      - Common Issues: advanced/common-issues.md
      - Debugging Techniques: advanced/debugging.md
      - Migration Guide: advanced/migration.md
  - Reference:
      - Attribute Reference: reference/attributes.md
      - Grammar Syntax Reference: reference/grammar-syntax.md
      - Keyboard Shortcuts: reference/shortcuts.md
      - Glossary: reference/glossary.md
  - Appendices:
      - Example Grammars: appendices/examples.md
      - Resources: appendices/resources.md
      - FAQ: appendices/faq.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/JetBrains/Grammar-Kit
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/jetbrains

copyright: Copyright &copy; 2026 JetBrains s.r.o.